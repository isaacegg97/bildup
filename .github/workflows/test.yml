name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: node scripts/test.js
      - name: Run token-audit
        run: node scripts/audit-tokens.js
      - name: Run benchmark comparison
        run: |
          for f in benchmarks/bildup/*.bu; do
            name=$(basename "$f" .bu)
            node bildup.js "$f" -o "benchmarks/bildup/${name}.html"
            diff -q "benchmarks/bildup/${name}.html" "benchmarks/html-tailwind/${name}.html" \
              && echo "✅ $name matches" \
              || (echo "❌ $name mismatch" && exit 1)
          done
