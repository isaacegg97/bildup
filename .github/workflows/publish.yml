name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Verify version tag matches package.json
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          if [[ "${GITHUB_REF#refs/tags/}" != "v$PACKAGE_VERSION" ]]; then
            echo "Tag version does not match package.json"; exit 1;
          fi
      - name: Run token-audit
        run: node scripts/audit-tokens.js
      - name: Run tests
        run: npm test
      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
